# 1. Standard H2 Database Connection (removes strict PostgreSQL restrictions)
spring.datasource.url=jdbc:h2:mem:apexpay_testdb;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. Let Hibernate choose the standard H2 Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# 3. Disable migrations for tests
spring.flyway.enabled=false
spring.liquibase.enabled=false

# 4. Prevent SQL script execution timing conflicts
spring.jpa.defer-datasource-initialization=true