# 1. H2 Database Connection with PostgreSQL compatibility
spring.datasource.url=jdbc:h2:mem:apexpay_testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. Force Hibernate to automatically CREATE the schema from @Entity annotations
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# 3. Prevent SQL script execution timing conflicts (Crucial!)
# This ensures that Hibernate builds the tables first, and any data-seeding happens AFTER
spring.jpa.defer-datasource-initialization=true