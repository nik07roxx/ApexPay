# Application Name
spring.application.name=ApexPay-Banking-Service

# DataSource Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/apexpay_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=apexdb
spring.datasource.password=apexpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Redis Cloud Explicit Configuration
spring.redis.host=flight-optimistic-wheel-17619.db.redis.io
spring.redis.port=17506
spring.redis.password=${REDIS_PASSWORD}

# Hibernate Properties
# 'update' will create/update tables automatically. For production, use 'validate' or 'none'.
spring.jpa.hibernate.ddl-auto=update

# Shows the SQL being executed in the console (Great for debugging!)
spring.jpa.show-sql=true

# Formats the SQL so it's readable in the console
spring.jpa.properties.hibernate.format_sql=true

# 3. Optional: Shows the values being passed to the SQL parameters
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Trace exact cache operations (Lookups, Hits, Puts)
logging.level.org.springframework.cache=TRACE

# The dialect for MySQL 8+
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Hide the stack trace from the API response
server.error.include-stacktrace=never

# Optional: Hide the detailed message if you want it even cleaner
# server.error.include-message=never

# Server Port
server.port=8080

# Swagger UI (SpringDoc) Configuration
# This makes it easy to find your documentation
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Point to your local broker
spring.kafka.bootstrap-servers=localhost:9092

# Producer Configuration: Key remains a String, but Value becomes JSON!
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Consumer Configuration: Value becomes JSON!
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.group-id=apexpay-txn-group
spring.kafka.consumer.auto-offset-reset=earliest

# CRITICAL SECURITY LINE: Tell Spring it is safe to deserialize your specific model objects
spring.kafka.consumer.properties.spring.json.trusted.packages=com.nik07roxx.apexPay.DTO*

# ==========================================
# SPRING MAIL INFRASTRUCTURE CONFIGURATION
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=apexpaybanking@gmail.com
# For Gmail, this MUST be a 16-character 'App Password', not your raw login password!
spring.mail.password=khpx yylw mpor klpk

# Underlying JavaMail Architecture Properties
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# JWT Token Creation Key
app.jwt.secret=YourSuperSecretKeyForLocalDevelopmentAndTestingOnlyMakeItLong

# Exchange Rate API Key
app.exchangerate-api.key=353ad5bc93b4cccd1e218c5b

# ===================================================================
# Actuator Endpoint Exposure Configuration
# ===================================================================

# Open web visibility for health status, JVM metrics, and Prometheus text formatting
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# Explicitly ensure the Prometheus scraping engine endpoint is turned on
management.endpoint.prometheus.enabled=true

# ===================================================================
# Micrometer Metrics Tagging
# ===================================================================
# Global dimensional label attached to every metric stream for easy filtering in Grafana
management.metrics.tags.application=apex-pay

logging.level.org.apache.kafka.clients.NetworkClient=ERROR
spring.kafka.producer.transaction-id-prefix=